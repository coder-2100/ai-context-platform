name: Publish

on:
  push:
    tags:
      - '@coder-2100/*@*'

concurrency: publish-${{ github.ref }}

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 解析 tag 获取包名和版本
        id: package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # @coder-2100/schema@0.1.0 → name=@coder-2100/schema, version=0.1.0
          NAME=$(echo "$TAG" | sed 's/@[^@]*$//')
          VERSION=$(echo "$TAG" | sed 's/.*@//')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建
        run: pnpm build

      - name: 测试
        run: pnpm test

      - name: 发布
        run: pnpm --filter ${{ steps.package.outputs.name }} publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
